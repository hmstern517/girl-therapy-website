<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <!-- v2.4 -->
  <title>Girl Therapy — Coming Soon</title>
  <meta name="description" content="Therapy is about to get a glow up. Girl Therapy is a telehealth platform built exclusively for women, by women. Be the first to know.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Hanken+Grotesk:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Hanken Grotesk', system-ui, sans-serif;
      color: #fff;
      background: #FF66C4;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    ::selection {
      background: #FFECAD;
      color: #2E1F28;
    }

    .hero {
      min-height: 100vh;
      min-height: 100dvh; /* accounts for mobile browser chrome */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: clamp(16px, 3vw, 36px) clamp(22px, 6vw, 56px);
      background: #FF66C4;
      position: relative;
      overflow: hidden;
    }

    .hero__inner {
      width: 100%;
      max-width: 900px;
      position: relative;
      z-index: 1;
    }

    h1 {
      margin: 0 auto;
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: clamp(44px, 8vw, 108px);
      line-height: 0.95;
      letter-spacing: -0.04em;
      color: #fff;
    }

    h1 .highlight {
      color: #FFECAD;
    }

    .hero__sub {
      margin: clamp(14px, 2vw, 22px) auto 0;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: clamp(16px, 1.8vw, 22px);
      letter-spacing: -0.01em;
      color: #FFF0F8;
    }

    /* ===== Form ===== */
    form {
      margin: clamp(18px, 2.5vw, 32px) auto 0;
      max-width: 520px;
    }

    .form-fields {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .input-wrap {
      position: relative;
    }

    input[type="tel"],
    input[type="email"],
    input[type="text"] {
      width: 100%;
      padding: 16px 24px;
      border-radius: 999px;
      border: 2px solid #fff;
      font-size: 16px;
      font-family: 'Hanken Grotesk', sans-serif;
      color: #2E1F28;
      background: #fff;
      outline: none;
      transition: box-shadow 0.2s, border-color 0.2s;
    }

    input:focus {
      border-color: #FFECAD;
      box-shadow: 0 0 0 4px rgba(255, 236, 173, 0.45);
    }

    input::placeholder {
      color: #B8A8B2;
    }

    /* Consent rows */
    .consent-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      text-align: left;
      padding: 2px 4px;
      font-size: 13.5px;
      line-height: 1.5;
      color: #FFF0F8;
    }

    .consent-row input[type="checkbox"] {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      margin: 0.1em 0 0;
      accent-color: #FFECAD;
      cursor: pointer;
      border-radius: 4px;
    }

    .consent-row label {
      cursor: pointer;
    }

    /* Consent shake animation */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-8px); }
      40%       { transform: translateX(8px); }
      60%       { transform: translateX(-6px); }
      80%       { transform: translateX(6px); }
    }

    .consent-row.shake {
      animation: shake 0.45s ease;
    }

    .consent-row.highlight-required label {
      color: #FFECAD;
      font-weight: 700;
    }

    .consent-row.highlight-required input[type="checkbox"] {
      outline: 2px solid #FFECAD;
      outline-offset: 2px;
    }

    /* Submit */
    button[type="submit"] {
      margin-top: 2px;
      padding: 16px 32px;
      border-radius: 999px;
      border: none;
      background: #FFECAD;
      color: #2E1F28;
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 17px;
      letter-spacing: -0.01em;
      cursor: pointer;
      box-shadow: 0 16px 34px -14px rgba(255, 236, 173, 0.9);
      transition: transform 0.2s, box-shadow 0.2s;
      white-space: nowrap;
      width: 100%;
    }

    button[type="submit"]:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 40px -12px rgba(255, 236, 173, 0.95);
    }

    button[type="submit"]:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    /* Success */
    .success {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 20px 28px;
      border-radius: 18px;
      background: #FFECAD;
      color: #2E1F28;
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 17px;
      text-align: center;
    }

    .success.is-visible {
      display: flex;
    }

    /* Micro */
    .micro {
      margin: 18px auto 0;
      font-size: 12px;
      color: #FFD7EC;
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="hero__inner">

      <h1>therapy is about to get a <span class="highlight">glow up</span></h1>

      <p class="hero__sub">Be the first to know.</p>

      <form id="waitlist-form" data-form-type="waitlist">
        <div class="form-fields" data-wl-form>

          <!-- Single input — toggles between tel and email -->
          <div class="input-wrap">
            <input type="tel" id="wl-input" name="phone" required
              placeholder="your phone number"
              autocomplete="tel" inputmode="tel">
          </div>

          <!-- SMS consent (required) -->
          <div class="consent-row" id="sms-consent-row">
            <input type="checkbox" id="wl-consent" name="smsConsent" required>
            <label for="wl-consent">Yes, text me updates from Girl Therapy. Msg &amp; data rates may apply. Msg frequency varies. Reply STOP to opt out, HELP for help.</label>
          </div>

          <!-- Email toggle (optional) -->
          <div class="consent-row" id="email-toggle-row">
            <input type="checkbox" id="wl-email-toggle">
            <label for="wl-email-toggle">I'd rather give you my email.</label>
          </div>

          <button type="submit">join the waitlist</button>
        </div>

        <div class="success" data-wl-success>★ you're on the list.</div>
      </form>

      <p class="micro">No spam. Just real updates on real progress. Unsubscribe anytime.</p>
    </div>
  </section>

  <script src="assets/js/main.js"></script>
  <script>
    const input       = document.getElementById('wl-input');
    const emailToggle = document.getElementById('wl-email-toggle');
    const smsRow      = document.getElementById('sms-consent-row');
    const smsCheck    = document.getElementById('wl-consent');
    const form        = document.getElementById('waitlist-form');

    // Email toggle — swap input type, placeholder, name, and hide/show SMS consent
    emailToggle.addEventListener('change', () => {
      if (emailToggle.checked) {
        input.type        = 'email';
        input.name        = 'email';
        input.placeholder = 'your email';
        input.autocomplete = 'email';
        input.inputMode   = '';
        // Email mode: SMS consent not applicable — uncheck + hide
        smsCheck.checked  = false;
        smsCheck.required = false;
        smsRow.style.display = 'none';
      } else {
        input.type        = 'tel';
        input.name        = 'phone';
        input.placeholder = 'your phone number';
        input.autocomplete = 'tel';
        input.inputMode   = 'tel';
        // Back to phone mode — SMS consent required again
        smsCheck.required = true;
        smsRow.style.display = 'flex';
      }
      input.value = '';
      input.focus();
    });

    // Consent reminder on submit — if phone mode and consent unchecked
    // We suppress the native :required tooltip and use our own shake+highlight
    form.addEventListener('submit', (e) => {
      if (!emailToggle.checked && !smsCheck.checked) {
        e.preventDefault();
        e.stopImmediatePropagation();
        // Temporarily remove required so browser doesn't show its own tooltip
        smsCheck.required = false;
        smsRow.classList.remove('shake', 'highlight-required');
        void smsRow.offsetWidth; // force reflow for animation restart
        smsRow.classList.add('shake', 'highlight-required');
        setTimeout(() => {
          smsRow.classList.remove('highlight-required');
          smsCheck.required = true; // restore required
        }, 2800);
        smsCheck.focus();
      }
    }, true);
  </script>
</body>
</html>
